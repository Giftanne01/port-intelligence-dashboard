<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Port Intelligence Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font (Cyber Feel) -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Share Tech Mono', monospace;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 60px auto;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 60%;
            max-width: 300px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 16px;
            margin-right: 10px;
        }

        button {
            padding: 12px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }

        #searchBtn {
            background-color: #0ea5e9;
            color: white;
        }

        #clearBtn {
            background-color: #ef4444;
            color: white;
        }

        button:hover {
            opacity: 0.85;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            text-align: left;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .risk.low { color: #22c55e; }
        .risk.medium { color: #eab308; }
        .risk.high { color: #f97316; }
        .risk.critical { color: #ef4444; }

        footer {
            margin-top: 40px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Port Intelligence Dashboard</h1>
    <p class="subtitle">
        Cybersecurity-focused reconnaissance tool for analyzing exposed network services.
    </p>

    <!-- Input Section -->
    <div>
        <input type="number" id="portInput" placeholder="Enter port number">
        <button id="searchBtn">Analyze Port</button>
        <button id="clearBtn">Clear</button>
    </div>

    <!-- Statistics Section -->
    <div id="stats"></div>

    <!-- Result Section -->
    <div id="result"></div>

    <footer>
        Built by Gigi | Cybersecurity Portfolio Project
    </footer>
</div>

<!-- Link JavaScript -->
<script src="script.js"></script>

</body>
</html>
